version: 2
updates:
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 3
    groups:
      dotnet:
        patterns:
          - "*"
    ignore:
      - dependency-name: "Microsoft.EntityFrameworkCore.*"
      - dependency-name: "Microsoft.Extensions.*"
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: npm
    directory: /src/LLL.DurableTask.Ui/app
    schedule:
      interval: weekly
    cooldown:
      default-days: 3
    groups:
      npm:
        patterns:
          - "*"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 3
    groups:
      github-actions:
        patterns:
          - "*"
    # Actions are pinned to floating major tags (e.g. @v6), so minor/patch
    # updates are picked up automatically. Only open PRs for major bumps.
    ignore:
      - dependency-name: "*"
        update-types:
          ["version-update:semver-minor", "version-update:semver-patch"]

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 3
    groups:
      docker:
        patterns:
          - "*"
